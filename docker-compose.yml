version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: aroma_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aroma_user
      POSTGRES_PASSWORD: aroma_password
      POSTGRES_DB: aroma_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
